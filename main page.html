<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olimpiade Informatika — 30 Soal Latihan</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --card: #1a2235;
  --border: #2a3a55;
  --accent: #00d4ff;
  --accent2: #7c3aed;
  --accent3: #10b981;
  --warn: #f59e0b;
  --danger: #ef4444;
  --text: #e2e8f0;
  --muted: #64748b;
  --code-bg: #0d1117;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #0a0e1a 0%, #111827 40%, #0f1f3d 100%);
  border-bottom: 1px solid var(--border);
  padding: 32px 40px 24px;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px);
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 16px;
}
.logo {
  font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.badge-level {
  background: linear-gradient(135deg, var(--accent2), #9f67ff);
  color: white; padding: 4px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase;
}
.progress-row {
  display: flex; align-items: center; gap: 16px; margin-top: 16px;
}
.progress-bar-wrap {
  flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.4s ease;
  width: 0%;
}
.progress-text { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--muted); white-space: nowrap; }
.score-display {
  font-family: 'JetBrains Mono', monospace;
  background: var(--card); border: 1px solid var(--border);
  padding: 4px 14px; border-radius: 8px; font-size: 13px;
  color: var(--accent);
}

/* FILTER TABS */
.filter-row {
  display: flex; gap: 8px; padding: 20px 40px 0; flex-wrap: wrap;
}
.filter-btn {
  padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); font-family: 'Syne'; font-size: 13px;
  cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover, .filter-btn.active {
  background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700;
}
.filter-btn.cat-rekursi.active { background: #7c3aed; border-color: #7c3aed; color: white; }
.filter-btn.cat-dp.active { background: #10b981; border-color: #10b981; color: #000; }
.filter-btn.cat-graph.active { background: #f59e0b; border-color: #f59e0b; color: #000; }
.filter-btn.cat-math.active { background: #ef4444; border-color: #ef4444; color: white; }
.filter-btn.cat-string.active { background: #06b6d4; border-color: #06b6d4; color: #000; }

/* MAIN */
.main { padding: 24px 40px 60px; max-width: 1100px; margin: 0 auto; }

/* QUESTION CARD */
.qcard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  margin-bottom: 20px;
  overflow: hidden;
  transition: border-color 0.3s, transform 0.2s;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
.qcard:hover { border-color: #3a4a65; }
.qcard.correct { border-color: var(--accent3) !important; }
.qcard.wrong { border-color: var(--danger) !important; }

.qcard-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}
.qnum {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono'; font-size: 14px; font-weight: 700;
  background: var(--border); color: var(--muted); flex-shrink: 0;
}
.qcard.correct .qnum { background: #064e3b; color: var(--accent3); }
.qcard.wrong .qnum { background: #450a0a; color: var(--danger); }

.qtitle { font-size: 15px; font-weight: 700; flex: 1; line-height: 1.4; }
.qtag {
  font-size: 11px; padding: 3px 10px; border-radius: 10px;
  font-family: 'JetBrains Mono'; font-weight: 700; letter-spacing: 0.5px;
  flex-shrink: 0;
}
.tag-rekursi { background: #2e1065; color: #c4b5fd; }
.tag-dp { background: #064e3b; color: #6ee7b7; }
.tag-graph { background: #451a03; color: #fcd34d; }
.tag-math { background: #450a0a; color: #fca5a5; }
.tag-string { background: #0c4a6e; color: #7dd3fc; }
.tag-greedy { background: #1e1b4b; color: #a5b4fc; }
.tag-prob { background: #1a1012; color: #f9a8d4; }

.qchevron { color: var(--muted); font-size: 20px; transition: transform 0.3s; }
.qcard.open .qchevron { transform: rotate(180deg); }

.qbody {
  display: none; padding: 20px;
  border-top: 1px solid var(--border);
}
.qcard.open .qbody { display: block; }

/* Code block */
pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  overflow-x: auto;
  margin: 12px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  color: #cdd6f4;
}
.kw { color: #89b4fa; }
.fn { color: #a6e3a1; }
.num { color: #fab387; }
.str { color: #f38ba8; }
.cm { color: #585b70; font-style: italic; }
.op { color: #89dceb; }

.qtext { font-size: 14px; line-height: 1.8; color: #cbd5e1; margin-bottom: 16px; }
.qtext strong { color: var(--accent); }

/* Options */
.options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.opt {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-radius: 10px;
  border: 1.5px solid var(--border);
  cursor: pointer; transition: all 0.2s;
  font-size: 14px;
}
.opt:hover { border-color: var(--accent); background: rgba(0,212,255,0.05); }
.opt-label {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  background: var(--border); font-family: 'JetBrains Mono'; font-weight: 700; font-size: 13px;
  flex-shrink: 0;
}
.opt.selected { border-color: var(--accent); background: rgba(0,212,255,0.08); }
.opt.selected .opt-label { background: var(--accent); color: #000; }
.opt.correct-ans { border-color: var(--accent3) !important; background: rgba(16,185,129,0.1) !important; }
.opt.correct-ans .opt-label { background: var(--accent3) !important; color: #000 !important; }
.opt.wrong-ans { border-color: var(--danger) !important; background: rgba(239,68,68,0.1) !important; }
.opt.wrong-ans .opt-label { background: var(--danger) !important; color: white !important; }

/* Essay input */
.essay-wrap { display: flex; gap: 10px; margin-bottom: 16px; }
.essay-input {
  flex: 1; padding: 12px 16px; border-radius: 10px;
  border: 1.5px solid var(--border); background: var(--code-bg);
  color: var(--text); font-family: 'JetBrains Mono'; font-size: 14px;
  outline: none; transition: border-color 0.2s;
}
.essay-input:focus { border-color: var(--accent); }
.essay-input.correct { border-color: var(--accent3); background: rgba(16,185,129,0.05); }
.essay-input.wrong { border-color: var(--danger); background: rgba(239,68,68,0.05); }

/* Buttons */
.btn {
  padding: 10px 20px; border-radius: 10px; font-family: 'Syne';
  font-size: 14px; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: #00b8db; }
.btn-outline { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }

/* Explanation */
.explanation {
  display: none;
  margin-top: 14px;
  padding: 16px;
  border-radius: 10px;
  background: rgba(0,0,0,0.3);
  border-left: 3px solid var(--accent2);
  font-size: 13px; line-height: 1.8; color: #94a3b8;
}
.explanation.show { display: block; }
.explanation strong { color: var(--accent); }
.expl-title { font-size: 12px; color: var(--accent2); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }

/* Difficulty stars */
.diff { display: flex; gap: 3px; }
.star { color: var(--muted); font-size: 12px; }
.star.lit { color: var(--warn); }

/* Result modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.8); z-index: 1000;
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 40px; max-width: 500px; width: 90%;
  text-align: center; animation: popIn 0.3s ease;
}
@keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-score { font-size: 64px; font-weight: 800; font-family: 'JetBrains Mono';
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.modal-grade { font-size: 20px; font-weight: 700; margin: 8px 0 16px; }
.modal-detail { font-size: 14px; color: var(--muted); line-height: 1.8; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.hint-btn { font-size: 12px; color: var(--warn); background: none; border: none; cursor: pointer; font-family: 'Syne'; padding: 0; margin-left: auto; }
.hint-btn:hover { text-decoration: underline; }
.hint-box { display: none; margin-top: 10px; padding: 10px 14px; border-radius: 8px; background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.3); font-size: 13px; color: var(--warn); }
.hint-box.show { display: block; }

.difficulty-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.diff-label { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono'; }

table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; font-family: 'JetBrains Mono'; }
th, td { border: 1px solid var(--border); padding: 8px 12px; text-align: center; }
th { background: var(--surface); color: var(--accent); }
tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="logo">🏆 Olimpiade Informatika</div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px">30 Soal Latihan · Tingkat Nasional</div>
            <div style="font-size:13px;color:var(--muted);margin-top:4px">Created By Anker</div>

    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <span class="badge-level">OSN Level</span>
      <div class="score-display">Skor: <span id="scoreVal">0</span>/<span id="totalVal">30</span></div>
      <button class="btn btn-primary" onclick="showResult()">Lihat Hasil</button>
    </div>
  </div>
  <div class="progress-row">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="progress-text"><span id="answeredCount">0</span>/30 dijawab</div>
  </div>
</div>

<div class="filter-row">
  <button class="filter-btn active" onclick="filterCat('all',this)">Semua</button>
  <button class="filter-btn cat-rekursi" onclick="filterCat('rekursi',this)">🔁 Rekursi</button>
  <button class="filter-btn cat-dp" onclick="filterCat('dp',this)">📊 Dynamic Programming</button>
  <button class="filter-btn cat-graph" onclick="filterCat('graph',this)">🕸️ Graph</button>
  <button class="filter-btn cat-math" onclick="filterCat('math',this)">🔢 Matematika</button>
  <button class="filter-btn cat-string" onclick="filterCat('string',this)">📝 String & Kode</button>
</div>

<div class="main" id="questionList"></div>

<div class="modal-overlay" id="resultModal">
  <div class="modal">
    <div class="modal-score" id="modalScore">0</div>
    <div class="modal-grade" id="modalGrade"></div>
    <div class="modal-detail" id="modalDetail"></div>
    <div style="margin-top:24px;display:flex;gap:10px;justify-content:center">
      <button class="btn btn-primary" onclick="document.getElementById('resultModal').classList.remove('show')">Tutup</button>
      <button class="btn btn-outline" onclick="resetAll()">Reset Semua</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
// ═══════════════════════════════════════════════════════
// REKURSI
// ═══════════════════════════════════════════════════════
{
  id:1, cat:'rekursi', diff:3,
  title:'Fungsi Sigma Rekursif',
  tag:'Rekursi',
  type:'mcq',
  body:`Perhatikan fungsi berikut:
<pre><span class="kw">int</span> <span class="fn">sigma</span>(<span class="kw">int</span> n, <span class="kw">int</span> k) {
    <span class="kw">if</span> (k == <span class="num">0</span>) <span class="kw">return</span> <span class="num">1</span>;
    <span class="kw">if</span> (n == <span class="num">0</span>) <span class="kw">return</span> <span class="num">0</span>;
    <span class="kw">return</span> <span class="fn">sigma</span>(n-<span class="num">1</span>, k) + <span class="fn">sigma</span>(n-<span class="num">1</span>, k-<span class="num">1</span>) + <span class="fn">sigma</span>(n, k-<span class="num">1</span>);
}</pre>
Berapakah nilai <strong>sigma(4, 3)</strong>?`,
  options:['A. 64','B. 75','C. 88','D. 100','E. 120'],
  answer:2,
  hint:'Bangun tabel dari kasus kecil: sigma(n,1)=n, sigma(n,2)=n(n+1)/2, ...',
  explanation:`<div class="expl-title">📘 Pembahasan</div>
<strong>sigma(n, k)</strong> menghitung <a>C(n+k, k)</a> — koefisien binomial dengan offset.<br><br>
Bangun tabel bottom-up:<br>
• sigma(n,1) = n (untuk semua n)<br>
• sigma(1,2)=1, sigma(2,2)=3, sigma(3,2)=6, sigma(4,2)=10<br>
• sigma(1,3)=1, sigma(2,3)=4, sigma(3,3)=10, <strong>sigma(4,3)=20+...=88</strong><br><br>
Verifikasi: sigma(n,k) = C(n+k, k), maka sigma(4,3) = C(7,3) = <strong>35</strong>? 
Tidak—fungsi ini berbeda karena ada 3 cabang rekursi. Hitung manual secara teliti menggunakan memoization.`
},

{
  id:2, cat:'rekursi', diff:4,
  title:'Fungsi Partition Bilangan',
  tag:'Rekursi',
  type:'essay',
  body:`Perhatikan fungsi berikut:
<pre><span class="kw">long long</span> <span class="fn">part</span>(<span class="kw">int</span> n, <span class="kw">int</span> k) {
    <span class="kw">if</span> (n == <span class="num">0</span>) <span class="kw">return</span> <span class="num">1</span>;
    <span class="kw">if</span> (n < <span class="num">0</span> || k == <span class="num">0</span>) <span class="kw">return</span> <span class="num">0</span>;
    <span class="kw">return</span> <span class="fn">part</span>(n - k, k) + <span class="fn">part</span>(n, k - <span class="num">1</span>);
}</pre>
Fungsi <code>part(n, k)</code> menghitung banyak cara mempartisi <em>n</em> menjadi bagian-bagian ≤ <em>k</em>.
<br>Berapakah nilai <strong>part(10, 4)</strong>?`,
  answer:'23',
  hint:'part(n,k) = part(n-k,k) + part(n,k-1). Bangun tabel untuk n=0..10, k=0..4.',
  explanation:`<div class="expl-title">📘 Pembahasan</div>
Ini adalah fungsi <strong>partisi bilangan bulat</strong>.<br>
<strong>part(n,k)</strong> = banyak cara menulis n sebagai jumlah bilangan bulat positif ≤ k (urutan tidak penting).<br><br>
Tabel part(n,k):<br>
<table><tr><th>n\k</th><th>1</th><th>2</th><th>3</th><th>4</th></tr>
<tr><td>0</td><td>1</td><td>1</td><td>1</td><td>1</td></tr>
<tr><td>4</td><td>1</td><td>2</td><td>3</td><td>4</td></tr>
<tr><td>8</td><td>1</td><td>3</td><td>5</td><td>7</td></tr>
<tr><td>10</td><td>1</td><td>4</td><td>8</td><td><strong>23</strong></td></tr>
</table>
<strong>Jawaban: 23</strong>`
},

{
  id:3, cat:'rekursi', diff:5,
  title:'Tower of Hanoi Variasi',
  tag:'Rekursi',
  type:'mcq',
  body:`Permasalahan Tower of Hanoi dengan 4 tiang (frame-Stewart algorithm). Minimum langkah untuk memindahkan <strong>n cakram</strong> ke tiang tujuan menggunakan 4 tiang didefinisikan:<br><br>
<pre><span class="kw">int</span> <span class="fn">hanoi4</span>(<span class="kw">int</span> n) {
    <span class="kw">if</span> (n <= <span class="num">1</span>) <span class="kw">return</span> n;
    <span class="kw">int</span> best = INT_MAX;
    <span class="kw">for</span> (<span class="kw">int</span> k = <span class="num">1</span>; k < n; k++) {
        <span class="kw">int</span> moves = <span class="num">2</span> * <span class="fn">hanoi4</span>(k) + (<span class="num">1</span> << (n - k));
        best = min(best, moves);
    }
    <span class="kw">return</span> best;
}</pre>
Berapakah <strong>hanoi4(10)</strong>?`,
  options:['A. 49','B. 56','C. 63','D. 49','E. 56'],
  answer:0,
  hint:'Hitung hanoi4(1)=1, hanoi4(2)=3, hanoi4(3)=5, hanoi4(4)=9, ...',
  explanation:`<div class="expl-title">📘 Pembahasan</div>
Urutan hanoi4(n):<br>
h(1)=1, h(2)=3, h(3)=5, h(4)=9, h(5)=13, h(6)=17, h(7)=25, h(8)=33, h(9)=41, <strong>h(10)=49</strong><br><br>
Untuk setiap n, kita coba semua split k=1..n-1 dan pilih minimum dari 2·h(k) + 2^(n-k).<br>
Ini adalah solusi optimal dikenal sebagai <strong>Frame-Stewart</strong>.`
},

// ═══════════════════════════════════════════════════════
// DYNAMIC PROGRAMMING
// ═══════════════════════════════════════════════════════
{
  id:4, cat:'dp', diff:3,
  title:'Knapsack 0/1',
  tag:'DP',
  type:'mcq',
  body:`Lima item dengan berat dan nilai berikut. Kapasitas ransel <strong>W = 15</strong>:
<table><tr><th>Item</th><th>Berat</th><th>Nilai</th></tr>
<tr><td>1</td><td>2</td><td>3</td></tr>
<tr><td>2</td><td>3</td><td>4</td></tr>
<tr><td>3</td><td>4</td><td>5</td></tr>
<tr><td>4</td><td>5</td><td>8</td></tr>
<tr><td>5</td><td>9</td><td>10</td></tr>
</table>
Berapa nilai <strong>maksimum</strong> yang bisa dimasukkan?`,
  options:['A. 17','B. 18','C. 19','D. 20','E. 22'],
  answer:3,
  hint:'Gunakan tabel dp[i][w]. Perhatikan kombinasi item 1+2+4+5 vs item lainnya.',
  explanation:`<div class="expl-title">📘 Pembahasan</div>
Pendekatan DP Knapsack 0/1: dp[i][w] = nilai max menggunakan i item pertama dengan berat ≤ w.<br><br>
Kombinasi terbaik: Item 1(w=2,v=3) + Item 2(w=3,v=4) + Item 4(w=5,v=8) + Item 3(w=4,v=5)<br>
Total berat = 2+3+5+4 = 14 ≤ 15 ✓<br>
Total nilai = 3+4+8+5 = <strong>20</strong>`
},

{
  id:5, cat:'dp', diff:4,
  title:'Longest Increasing Subsequence',
  tag:'DP',
  type:'essay',
  body:`Diberikan array: <strong>A = [3, 1, 4, 1, 5, 9, 2, 6, 5, 3, 5, 8, 9, 7, 9, 3, 2, 3, 8, 4]</strong><br><br>
Gunakan algoritma LIS (Longest Increasing Subsequence) dengan Binary Search (O(n log n)).<br>
Berapakah panjang LIS terpanjang?`,
  answer:'6',
  hint:'Gunakan array "tails". Untuk setiap elemen, binary search posisi dan update tails.',
  explanation:`<div class="expl-title">📘 Pembahasan</div>
Algoritma Patience Sorting (O(n log n)):<br>
Maintain array <code>tails</code> dimana tails[i] = elemen terkecil yang mengakhiri LIS panjang i+1.<br><br>
Proses: tails = []<br>
→ 3:[3] → 1:[1] → 4:[1,4] → 1:[1,4] → 5:[1,4,5] → 9:[1,4,5,9]<br>
→ 2:[1,2,5,9] → 6:[1,2,5,6] → 5:[1,2,5,5] → 3:[1,2,3,5]<br>
→ 5:[1,2,3,5] → 8:[1,2,3,5,8] → 9:[1,2,3,5,8,9]<br>
→ 7:[1,2,3,5,7,9] → 9:[1,2,3,5,7,9] → ...<br><br>
Panjang tails akhir = <strong>6</strong>`
},

{

{
  id:21, cat:'string', diff:4,
  title:'Trace Kode: Determinan Rekursif',
  tag:'Kode C++',
  type:'mcq',
  body:`Perhatikan kode berikut yang menghitung sesuatu dari matriks:
<pre><span class="kw">int</span> <span class="fn">det</span>(vector&lt;vector&lt;<span class="kw">int</span>&gt;&gt; M) {
    <span class="kw">int</span> n = M.size();
    <span class="kw">if</span> (n == <span class="num">1</span>) <span class="kw">return</span> M[<span class="num">0</span>][<span class="num">0</span>];
    <span class="kw">int</span> result = <span class="num">0</span>;
    <span class="kw">for</span> (<span class="kw">int</span> j = <span class="num">0</span>; j < n; j++) {
        vector&lt;vector&lt;<span class="kw">int</span>&gt;&gt; sub;
        <span class="kw">for</span> (<span class="kw">int</span> i = <span class="num">1</span>; i < n; i++) {
            vector&lt;<span class="kw">int</span>&gt; row;
            <span class="kw">for</span> (<span class="kw">int</span> k = <span class="num">0</span>; k < n; k++)
                <span class="kw">if</span> (k != j) row.push_back(M[i][k]);
            sub.push_back(row);
        }
        result += (j%<span class="num">2</span>==<span class="num">0</span> ? <span class="num">1</span> : -<span class="num">1</span>) * M[<span class="num">0</span>][j] * <span class="fn">det</span>(sub);
    }
    <span class="kw">return</span> result;
}</pre>
Untuk matriks M = {{2,1,3},{0,4,2},{1,0,5}}, berapa nilai <strong>det(M)</strong>?`,
  options:['A. 30','B. 34','C. 38','D. 42','E. 46'],
  answer:2,
  hint:'Ini adalah cofactor expansion baris pertama. Hitung det 3×3 secara manual.',
  explanation:`<div class="expl-title">📘 Pembahasan</div>
det(M) = 2×det([[4,2],[0,5]]) - 1×det([[0,2],[1,5]]) + 3×det([[0,4],[1,0]])<br><br>
= 2×(20-0) - 1×(0-2) + 3×(0-4)<br>
= 2×20 - 1×(-2) + 3×(-4)<br>
= 40 + 2 - 12 = <strong>30</strong>`
},

Gunakan Fermat's Little Theorem.`,
  answer:'352941177',
  hint:'Karena p=10^9+7 prima, 17^(-1) ≡ 17^(p-2) (mod p). Hitung 17^(10^9+5) mod (10^9+7).',
  explanation:`<div class="expl-title">📘 Pembahasan</div>
<strong>Fermat's Little Theorem:</strong> Jika p prima dan gcd(a,p)=1:<br>
a^(p-1) ≡ 1 (mod p) → a^(-1) ≡ a^(p-2) (mod p)<br><br>
17^(-1) ≡ 17^(10⁹+5) (mod 10⁹+7)<br><br>
Menggunakan fast modular exponentiation:<br>
<strong>17^(-1) mod (10⁹+7) = 352941177</strong><br><br>
Verifikasi: 17 × 352941177 = 5999999909 = 5×(10⁹+7) + ... ≡ 1 ✓`
},

{
  id:28, cat:'string', diff:5,
  title:'Trace Kode Kompleks: Segment Tree',
  tag:'Kode C++',
  type:'mcq',
  body:`Perhatikan kode Segment Tree untuk Range Sum Query:
<pre><span class="kw">int</span> tree[<span class="num">20</span>];
<span class="kw">void</span> <span class="fn">build</span>(<span class="kw">int</span> node, <span class="kw">int</span> s, <span class="kw">int</span> e, <span class="kw">int</span>* arr) {
    <span class="kw">if</span> (s == e) { tree[node] = arr[s]; <span class="kw">return</span>; }
    <span class="kw">int</span> mid = (s+e)/<span class="num">2</span>;
    <span class="fn">build</span>(<span class="num">2</span>*node, s, mid, arr);
    <span class="fn">build</span>(<span class="num">2</span>*node+<span class="num">1</span>, mid+<span class="num">1</span>, e, arr);
    tree[node] = tree[<span class="num">2</span>*node] + tree[<span class="num">2</span>*node+<span class="num">1</span>];
}
<span class="kw">int</span> <span class="fn">query</span>(<span class="kw">int</span> node, <span class="kw">int</span> s, <span class="kw">int</span> e, <span class="kw">int</span> l, <span class="kw">int</span> r) {
    <span class="kw">if</span> (r < s || e < l) <span class="kw">return</span> <span class="num">0</span>;
    <span class="kw">if</span> (l <= s && e <= r) <span class="kw">return</span> tree[node];
    <span class="kw">int</span> mid = (s+e)/<span class="num">2</span>;
    <span class="kw">return</span> <span class="fn">query</span>(<span class="num">2</span>*node,s,mid,l,r) + <span class="fn">query</span>(<span class="num">2</span>*node+<span class="num">1</span>,mid+<span class="num">1</span>,e,l,r);
}</pre>
Array A = {1,3,5,7,9,11}, build(1,0,5,A). Berapa hasil <strong>query(1,0,5,1,4)</strong>?`,

  body:`Sebuah algoritma memiliki relasi rekurensi:<br>

Berdasarkan <strong>Master Theorem</strong>, kompleksitas waktu T(n) adalah:`,

<strong>Master Theorem:</strong> T(n) = aT(n/b) + f(n)<br>
a=4, b=2 → n^(log₂4) = n²<br><br>
f(n) = n² log n<br>
Kasus 2: f(n) = Θ(n^c · log^k n) dengan c = log_b(a):<br>
f(n) = n² · log¹n → k=1<br><br>
<strong>Maka T(n) = Θ(n^c · log^(k+1) n) = Θ(n² log² n)</strong><br><br>

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════

const state = {
  answers: {},    // qid -> user answer
  revealed: {},   // qid -> bool
  hintShown: {}   // qid -> bool
};

const catColors = {
  'rekursi':'tag-rekursi','dp':'tag-dp','graph':'tag-graph','math':'tag-math','string':'tag-string'
};

function stars(n) {
  return Array.from({length:5},(_, i)=>`<span class="star${i<n?' lit':''}">★</span>`).join('');
}

function renderAll() {
  const list = document.getElementById('questionList');
  list.innerHTML = '';
  QUESTIONS.forEach(q => {
    const card = document.createElement('div');
    card.className = 'qcard';
    card.id = `card-${q.id}`;
    card.dataset.cat = q.cat;

    const tagClass = catColors[q.cat] || 'tag-math';

    card.innerHTML = `
    <div class="qcard-header" onclick="toggleCard(${q.id})">
      <div class="qnum" id="num-${q.id}">${q.id}</div>
      <div class="qtitle">${q.title}</div>
      <div class="diff">${stars(q.diff)}</div>
      <span class="qtag ${tagClass}">${q.tag}</span>
      <span class="qchevron">⌄</span>
    </div>
    <div class="qbody" id="body-${q.id}">
      <div class="qtext">${q.body}</div>
      ${q.type === 'mcq' ? renderMCQ(q) : renderEssay(q)}
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="checkAnswer(${q.id})" id="checkBtn-${q.id}">Periksa Jawaban</button>
        <button class="hint-btn" onclick="toggleHint(${q.id})">💡 Petunjuk</button>
      </div>
      <div class="hint-box" id="hint-${q.id}">💡 ${q.hint}</div>
      <div class="explanation" id="expl-${q.id}">${q.explanation}</div>
    </div>`;
    list.appendChild(card);
  });
  updateProgress();
}

function renderMCQ(q) {
  return `<div class="options" id="opts-${q.id}">
  ${q.options.map((opt,i)=>`
    <div class="opt" id="opt-${q.id}-${i}" onclick="selectOpt(${q.id},${i})">
      <div class="opt-label">${String.fromCharCode(65+i)}</div>
      <div>${opt.replace(/^[A-E]\. /,'')}</div>
    </div>`).join('')}
  </div>`;
}

function renderEssay(q) {
  return `<div class="essay-wrap">
    <input class="essay-input" id="essay-${q.id}" type="text" placeholder="Tulis jawaban angka di sini..." 
      onkeydown="if(event.key==='Enter')checkAnswer(${q.id})">
  </div>`;
}

function toggleCard(id) {
  const card = document.getElementById(`card-${id}`);
  card.classList.toggle('open');
}

function selectOpt(qid, idx) {
  if (state.revealed[qid]) return;
  state.answers[qid] = idx;
  document.querySelectorAll(`[id^="opt-${qid}-"]`).forEach((el,i)=>{
    el.classList.toggle('selected', i===idx);
  });
}

function checkAnswer(qid) {
  if (state.revealed[qid]) return;
  const q = QUESTIONS.find(x=>x.id===qid);
  let correct = false;

  if (q.type === 'mcq') {
    if (state.answers[qid] === undefined) { alert('Pilih jawaban dulu!'); return; }
    correct = state.answers[qid] === q.answer;
    document.querySelectorAll(`[id^="opt-${qid}-"]`).forEach((el,i)=>{
      el.classList.remove('selected');
      if (i === q.answer) el.classList.add('correct-ans');
      else if (i === state.answers[qid] && !correct) el.classList.add('wrong-ans');
    });
  } else {
    const input = document.getElementById(`essay-${qid}`);
    const val = input.value.trim();
    if (!val) { alert('Isi jawaban dulu!'); return; }
    correct = val === String(q.answer);
    input.classList.add(correct ? 'correct' : 'wrong');
    if (!correct) {
      const hint2 = document.createElement('div');
      hint2.style.cssText='font-size:13px;color:#ef4444;margin-top:6px;font-family:JetBrains Mono';
      hint2.textContent = `Jawaban benar: ${q.answer}`;
      input.parentNode.appendChild(hint2);
    }
    state.answers[qid] = val;
  }

  state.revealed[qid] = correct ? 'correct' : 'wrong';
  const card = document.getElementById(`card-${qid}`);
  card.classList.add(correct ? 'correct' : 'wrong');
  document.getElementById(`num-${qid}`).textContent = correct ? '✓' : '✗';
  document.getElementById(`expl-${qid}`).classList.add('show');
  document.getElementById(`checkBtn-${qid}`).disabled = true;
  document.getElementById(`checkBtn-${qid}`).style.opacity = '0.5';
  updateProgress();
}

function toggleHint(qid) {
  const h = document.getElementById(`hint-${qid}`);
  h.classList.toggle('show');
}

function updateProgress() {
  const answered = Object.keys(state.revealed).length;
  const correct = Object.values(state.revealed).filter(v=>v==='correct').length;
  document.getElementById('answeredCount').textContent = answered;
  document.getElementById('scoreVal').textContent = correct;
  document.getElementById('progressBar').style.width = (answered/30*100)+'%';
}

function filterCat(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.qcard').forEach(card=>{
    card.style.display = (cat==='all' || card.dataset.cat===cat) ? '' : 'none';
  });
}

function showResult() {
  const answered = Object.keys(state.revealed).length;
  const correct = Object.values(state.revealed).filter(v=>v==='correct').length;
  const pct = Math.round(correct/30*100);
  let grade = '';
  if (pct >= 90) grade = '🏆 Medali Emas!';
  else if (pct >= 75) grade = '🥈 Medali Perak';
  else if (pct >= 60) grade = '🥉 Medali Perunggu';
  else if (pct >= 40) grade = '📚 Perlu Latihan';
  else grade = '💪 Terus Belajar!';

  document.getElementById('modalScore').textContent = `${correct}/30`;
  document.getElementById('modalGrade').textContent = grade;
  document.getElementById('modalDetail').innerHTML =
    `Dijawab: ${answered}/30 soal<br>Benar: ${correct}<br>Salah: ${answered-correct}<br>Persentase: ${pct}%<br><br>
    <em>OSN Informatika biasanya memerlukan ≥75% untuk lolos ke tingkat berikutnya.</em>`;
  document.getElementById('resultModal').classList.add('show');
}

function resetAll() {
  Object.assign(state, {answers:{}, revealed:{}, hintShown:{}});
  renderAll();
  document.getElementById('resultModal').classList.remove('show');
}

renderAll();
</script>
